name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Run unit tests with coverage
        run: bun run test:coverage -- --reporter=default --reporter=junit --outputFile=./test-results/junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            node -e "const c=require('./coverage/coverage-summary.json').total;console.log(['lines','statements','functions','branches'].map(k=>\`- **\${k}**: \${c[k].pct}%\`).join('\n'))" >> $GITHUB_STEP_SUMMARY
          fi